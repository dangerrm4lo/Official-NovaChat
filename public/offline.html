<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NovaChat • Ошибка подключения</title>


    <!-- Шрифт -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


    <!-- Стиль -->
    <link rel="stylesheet" href="css/offline.css">

</head>


<body>


    <!-- Фоновый слой -->

    <div class="background"></div>



    <!-- Верхнее предупреждение -->


    <div class="top-bar">

        <span>⚠</span>

        Ошибка подключения к сайту! Попробуйте позже или перезапустите страницу.

    </div>




    <!-- Основной контент -->


    <main class="error-container">


        <!-- Иконка отключённого интернета -->


        <div class="icon">


            <svg xmlns="http://www.w3.org/2000/svg"

                viewBox="0 0 24 24"

                fill="none"

                stroke="currentColor"

                stroke-width="1.5"

                stroke-linecap="round"

                stroke-linejoin="round">


                <circle cx="12" cy="12" r="9"></circle>


                <path d="M3 12h18"></path>


                <path d="M12 3a15 15 0 0 1 0 18"></path>


                <path d="M12 3a15 15 0 0 0 0 18"></path>


                <line x1="4" y1="4" x2="20" y2="20"></line>


            </svg>


        </div>





        <h1>
            Ошибка.
        </h1>



        <p>

            Не удалось подключиться к NovaChat.<br>

            Сервер временно недоступен или отсутствует<br>

            подключение к интернету.

        </p>



    </main>





    <!-- Индикатор проверки подключения -->


    <div class="loading">


        <span></span>

        <span></span>

        <span></span>


    </div>





    <!-- Нижняя подпись -->


    <div class="footer">

        NOVACHAT SYSTEM • OFFLINE MODE

    </div>




    <script src="offline.js"></script>


</body>


</html>
