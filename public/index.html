<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaChat — Вход</title>

<link rel="icon" type="image/png" href="assets/favicon.ico">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-brand">

            <img
                src="assets/logo_outline.png"
                alt="NovaChat">

            <div class="brand-name">
                NovaChat
            </div>

        </div>

        <p class="auth-desc">
            NovaChat — связь без границ.
            <br>
            Будущее общения уже здесь.
        </p>

        <div class="auth-tabs">

            <button
                class="auth-tab active"
                data-tab="register"
                type="button">

                Регистрация

            </button>

            <button
                class="auth-tab"
                data-tab="login"
                type="button">

                Вход

            </button>

        </div>

        <!-- Регистрация -->

        <form
            id="registerForm"
            class="auth-form active"
            autocomplete="off">

            <div class="field">

                <label for="regUsername">
                    Никнейм
                </label>

                <input
                    id="regUsername"
                    type="text"
                    autocomplete="username"
                    placeholder="Введите никнейм"
                    required>

            </div>

            <div class="field">

                <label for="regPassword">
                    Пароль
                </label>

                <input
                    id="regPassword"
                    type="password"
                    autocomplete="new-password"
                    placeholder="Минимум 6 символов"
                    required>

            </div>

            <div
                id="registerError"
                class="auth-error">
            </div>

            <button
                class="auth-submit"
                type="submit">

                Создать аккаунт

            </button>

        </form>

        <!-- Вход -->

        <form
            id="loginForm"
            class="auth-form"
            autocomplete="off">

            <div class="field">

                <label for="loginUsername">
                    Никнейм
                </label>

                <input
                    id="loginUsername"
                    type="text"
                    autocomplete="username"
                    placeholder="Введите никнейм"
                    required>

            </div>

            <div class="field">

                <label for="loginPassword">
                    Пароль
                </label>

                <input
                    id="loginPassword"
                    type="password"
                    autocomplete="current-password"
                    placeholder="Введите пароль"
                    required>

            </div>

            <div
                id="loginError"
                class="auth-error">
            </div>

            <button
                class="auth-submit"
                type="submit">

                Войти

            </button>

        </form>

        <div
            class="auth-hint"
            id="authHint">

            Уже есть аккаунт?

            <button
                id="hintSwitch"
                type="button">

                Войти

            </button>

        </div>

    </div>

</div>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("/sw.js")
.catch(console.error);

}

</script>

<script src="js/auth.js"></script>

</body>
</html>
